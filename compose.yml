services:
  # === PostgreSQL Database ===
  postgres:
    image: timescale/timescaledb:latest-pg18
    container_name: historian-postgres
    environment:
      POSTGRES_DB: historydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
      # Разрешаем установку расширений
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./historian/store/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./init-scripts:/docker-entrypoint-initdb.d  # Добавляем папку для скриптов инициализации
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 350M  # Жесткий лимит памяти
        reservations:
          memory: 150M  # Гарантированный минимум (опционально)

  kafka:
    image: apache/kafka:latest
    container_name: historian-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1                     # ID узла
      KAFKA_PROCESS_ROLES: controller,broker  # Роли узла: контроллер и брокер
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'  # Адрес контроллера
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093  # Типы протокола и порты
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT  # Внутренний протокол для коммуникаций между брокерами
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER          # Должен присутствовать хотя бы один listener из KAFKA_LISTENERS
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # Коэффициент репликации offset-темы
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0  # Задержка начальной балансировки групп потреблени
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      # === ЖЕСТКИЕ ОГРАНИЧЕНИЯ ===
      # Время хранения: 4 часа (14400000 миллисекунд)
      KAFKA_LOG_RETENTION_HOURS: 4
      KAFKA_LOG_RETENTION_MS: 14400000    
      # Размер: 100 МБ (100 * 1024 * 1024 = 104857600 байт)
      KAFKA_LOG_RETENTION_BYTES: 104857600    
      # Политика очистки: удалять старые сообщения
      KAFKA_LOG_CLEANUP_POLICY: delete    
      # Частота проверки (каждую минуту для быстрой реакции)
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 60000    
      # Размер сегмента (меньше для более частой очистки)
      KAFKA_LOG_SEGMENT_BYTES: 10485760  # 10 МБ
      KAFKA_LOG_SEGMENT_MS: 3600000      # 1 час    
      # Максимальный размер сообщения
      KAFKA_MESSAGE_MAX_BYTES: 1048576   # 1 МБ
    
    volumes:
      - kafka_data:/kafka
    deploy:
      resources:
        limits:
          memory: 750M  # Жесткий лимит памяти
        reservations:
          memory: 500M  # Гарантированный минимум (опционально)
    restart: unless-stopped

  # === Historian Service ===
  historian:
    build: . 
    env_file:
      - ./historian/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 100M  # Жесткий лимит памяти
        reservations:
          memory: 70M  # Гарантированный минимум (опционально)
    restart: unless-stopped

  # === Emulator ===
  emulator:
    build:
      context: ./emulators/modbus
      dockerfile: Dockerfile
    container_name: historian-modbus-emulator
    ports:
      - "5502:5502"
    deploy:
      resources:
        limits:
          memory: 15M  # Жесткий лимит памяти
        reservations:
          memory: 10M  # Гарантированный минимум (опционально)
    restart: unless-stopped

  # === RTDS (Real-Time Data Service) ===
  rtds:
    build: .
    container_name: historian-rtds
    env_file:
      - ./rtds/.env
    ports:
      - "4000:4000"
      - "5002:5002"
    volumes:
      - rtds_data:/app/data
    depends_on:
      - kafka
      - emulator
    deploy:
      resources:
        limits:
          memory: 350M  # Жесткий лимит памяти
        reservations:
          memory: 150M  # Гарантированный минимум (опционально)
    restart: unless-stopped

  # === Prometheus ===
  prometheus:
    image: prom/prometheus:latest
    container_name: historian-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=5d'    # Хранить данные 30 дней
      - '--storage.tsdb.retention.size=500MB'   # Максимальный размер хранилища
      - '--web.console.libraries=/etc/prometheus/consoles'
      - '--web.console.templates=/etc/prometheus/consoles'
    deploy:
      resources:
        limits:
          memory: 100M  # Жесткий лимит памяти
        reservations:
          memory: 50M  # Гарантированный минимум (опционально)      
    restart: unless-stopped

  # === Grafana (опционально) ===
  grafana:
    image: grafana/grafana:latest
    container_name: historian-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 400M  # Жесткий лимит памяти
        reservations:
          memory: 350M  # Гарантированный минимум (опционально)
    restart: unless-stopped

volumes:
  rtds_data:
  postgres_data:
  prometheus_data:
  grafana_storage:
  zookeeper_data:
  kafka_data:
