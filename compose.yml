services:
  # === PostgreSQL Database ===
  postgres:
    image: timescale/timescaledb:latest-pg18
    container_name: kmes-postgres
    environment:
      POSTGRES_DB: historydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./historian/store/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1                     # ID узла
      KAFKA_PROCESS_ROLES: controller,broker  # Роли узла: контроллер и брокер
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'  # Адрес контроллера
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093  # Типы протокола и порты
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT  # Внутренний протокол для коммуникаций между брокерами
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER          # Должен присутствовать хотя бы один listener из KAFKA_LISTENERS
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # Коэффициент репликации offset-темы
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0  # Задержка начальной балансировки групп потреблени
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka_data:/kafka
    restart: unless-stopped

  # === Historian Service ===
  historian:
    build: 
      context: ./historian
      dockerfile: Dockerfile
    container_name: kmes-historian
    env_file:
      - ./historian/.env
#    environment:
#      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  # === Emulator ===
  emulator:
    build:
      context: ./emulators/modbus
      dockerfile: Dockerfile
    container_name: modbus-emulator
    ports:
      - "5502:5502"
    restart: unless-stopped

  # === RTDS (Real-Time Data Service) ===
  rtds:
    build:
      context: ./rtds
      dockerfile: Dockerfile
    container_name: kmes-rtds
    env_file:
      - ./rtds/.env
    ports:
      - "4000:4000"
      - "5002:5002"
    volumes:
      - rtds_data:/app/data
    depends_on:
      - kafka
      - emulator
    restart: unless-stopped

  # === Prometheus ===
  prometheus:
    image: prom/prometheus:latest
    container_name: kmes-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/consoles'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped

  # === Grafana (опционально) ===
  grafana:
    image: grafana/grafana:latest
    container_name: kmes-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  rtds_data:
  postgres_data:
  prometheus_data:
  grafana_storage:
  zookeeper_data:
  kafka_data:
